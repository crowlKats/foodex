name: Docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: build and push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-ref.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image ref by digest
        id: image-ref
        if: github.event_name != 'pull_request'
        run: echo "ref=${{ steps.prep.outputs.image }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: deploy to k8s
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Mint OIDC token for k8s
        id: token
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=k8s.routing.cafe" | jq -r .value)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        env:
          KUBE_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" > "$HOME/ca.crt"
          kubectl config set-cluster k8s \
            --server="${{ vars.K8S_API_SERVER }}" \
            --certificate-authority="$HOME/ca.crt" \
            --embed-certs=true
          kubectl config set-credentials gh --token="$KUBE_TOKEN"
          kubectl config set-context k8s \
            --cluster=k8s --user=gh --namespace=foodex
          kubectl config use-context k8s

      - name: Run migration job
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          kubectl set image cronjob/foodex-migrate "*=$IMAGE"
          JOB_NAME="foodex-migrate-${GITHUB_SHA::7}-$(date +%s)"
          kubectl create job "$JOB_NAME" --from=cronjob/foodex-migrate
          kubectl wait --for=condition=complete --timeout=10m "job/$JOB_NAME"

      - name: Roll out foodex deployment
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          kubectl set image deployment/foodex "*=$IMAGE"
          kubectl rollout status deployment/foodex --timeout=5m
